apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: styx
  namespace: realpolitik-services
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.realpolitik.world
    - chat.realpolitik.world
    secretName: styx-tls
  rules:
  - host: api.realpolitik.world
    http:
      paths:
      - path: /api/(.*)
        pathType: Prefix
        backend:
          service:
            name: styx
            port:
              number: 8080
      - path: /health
        pathType: Exact
        backend:
          service:
            name: styx
            port:
              number: 8080
  - host: chat.realpolitik.world
    http:
      paths:
      - path: /ws/(.*)
        pathType: Prefix
        backend:
          service:
            name: styx
            port:
              number: 8080
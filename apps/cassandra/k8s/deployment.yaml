"""
Cassandra microservice Kubernetes deployment.
"""

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassandra
  namespace: realpolitik
  labels:
    app: cassandra
    component: fallout-engine
spec:
  replicas: 0  # Scale to 0 when no jobs
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
        component: fallout-engine
    spec:
      containers:
      - name: cassandra
        image: realpolitik/cassandra:latest
        ports:
        - containerPort: 8080
          name: metrics
        env:
        # Database connections
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cassandra-secrets
              key: database-url
        - name: NEO4J_URI
          valueFrom:
            configMapKeyRef:
              name: cassandra-config
              key: neo4j-uri
        - name: NEO4J_USERNAME
          valueFrom:
            secretKeyRef:
              name: cassandra-secrets
              key: neo4j-username
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cassandra-secrets
              key: neo4j-password
        - name: QDRANT_URI
          valueFrom:
            configMapKeyRef:
              name: cassandra-config
              key: qdrant-uri
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: cassandra-config
              key: redis-url
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: cassandra-config
              key: rabbitmq-url
              
        # AI Service
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: cassandra-secrets
              key: openrouter-api-key
              
        # Processing
        - name: CASSANDRA_MAX_CONCURRENT
          value: "5"
        - name: ANALYSIS_TIMEOUT_SECONDS
          value: "120"
        - name: MODEL_ENRICHMENT
          value: "anthropic/claude-3-haiku"
        - name: MODEL_SYNTHESIS
          value: "anthropic/claude-3-sonnet"
          
        # Caching
        - name: ANALYSIS_CACHE_TTL_HOURS
          value: "24"
        - name: MAX_CACHE_SIZE_MB
          value: "500"
        
        # Queue
        - name: RABBITMQ_QUEUE
          value: "analysis.requested"
        - name: RABBITMQ_PREFETCH_COUNT
          value: "10"
        
        # Monitoring
        - name: ENABLE_METRICS
          value: "true"
        - name: METRICS_PORT
          value: "8080"
        
        # Resources
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        # Health check
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      
      # Service account for RBAC
      serviceAccountName: cassandra
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: cassandra
  namespace: realpolitik
  labels:
    app: cassandra
spec:
  selector:
    app: cassandra
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cassandra-hpa
  namespace: realpolitik
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cassandra
  minReplicas: 0
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cassandra-config
  namespace: realpolitik
data:
  neo4j-uri: "bolt://ariadne-service:7687"
  qdrant-uri: "http://mnemosyne-service:6333"
  redis-url: "redis://lethe-service:6379"
  rabbitmq-url: "amqp://iris-service:5672"

---
apiVersion: v1
kind: Secret
metadata:
  name: cassandra-secrets
  namespace: realpolitik
type: Opaque
stringData:
  database-url: "postgresql://username:password@atlas-service:5432/realpolitik"
  neo4j-username: "neo4j"
  neo4j-password: "your-neo4j-password"
  openrouter-api-key: "your-openrouter-api-key"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ServiceAccount
metadata:
  name: cassandra
  namespace: realpolitik

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cassandra
  namespace: realpolitik
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cassandra
  namespace: realpolitik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cassandra
subjects:
- kind: ServiceAccount
  name: cassandra
  namespace: realpolitik
name: aegis
description: "Realpolitik Intelligence Platform - Cross-platform Flutter application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core packages
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_riverpod: ^3.2.1
  dio: ^5.9.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  logger: ^2.6.2
  intl: ^0.20.2
  timeago: ^3.7.1
  maplibre_gl: ^0.25.0
  shared_preferences: ^2.5.4
  web_socket_channel: ^3.0.3
  build_runner: ^2.11.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true